server:
  port: 8081

spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.hospital.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  api-docs:
    enabled: true
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.hospital: DEBUG
