server:
  port: 8086

spring:
  ai:
    openai:
      api-key: sk-placeholder-will-be-replaced-in-iteration-2
      base-url: https://api.deepseek.com
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.hospital.ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    enabled: true
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.hospital: DEBUG
