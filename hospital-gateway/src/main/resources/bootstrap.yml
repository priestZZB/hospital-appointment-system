spring:
  application:
    name: hospital-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2

jwt:
  secret: hospital-appointment-system-jwt-secret-key-2026-must-be-at-least-32-chars
  expiration: 7200
